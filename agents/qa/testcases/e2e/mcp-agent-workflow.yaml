id: TC-0010
title: "MCP server end-to-end: initialize, tools/list, type_text, verify via screenshot"
status: active
category: e2e
priority: P1
source_issue: null
created: 2026-03-28
last_run: 2026-04-04
last_result: pass
consecutive_passes: 27
notes: "2026-04-04 R107: PASS — MCP initialize → list_windows → see_ui_tree all return valid JSON-RPC. 64 tools available. Chrome tree has 22 elements."

preconditions:
  - "naturo is installed and in PATH"
  - "Notepad is available"

steps:
  - description: "Launch Notepad"
    command: "naturo app launch notepad"
    expect: "Notepad opens successfully"
  - description: "Start MCP server and send initialize"
    command: "echo '{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"initialize\",\"params\":{\"protocolVersion\":\"2024-11-05\",\"capabilities\":{},\"clientInfo\":{\"name\":\"qa-test\",\"version\":\"1.0\"}}}' | timeout 5 naturo mcp start"
    expect: "JSON-RPC response with protocolVersion and serverInfo"
  - description: "Send type_text tool call via MCP"
    command: "Send tools/call with name=type_text, arguments={text: 'MCP_E2E_TEST', app: 'notepad'}"
    expect: "Response contains success: true"
  - description: "Screenshot verify text appeared"
    command: "naturo capture --app notepad -o /tmp/tc-0010.png"
    expect: "Screenshot shows 'MCP_E2E_TEST' in Notepad editor"
  - description: "Clean up"
    command: "naturo app quit notepad"
    expect: "Notepad closes"

pass_criteria: "MCP server accepts tool calls and operations produce visible results on desktop"
fail_action: "File GitHub issue for MCP tool call failures"
