id: TC-0004
title: "Calculator E2E: see elements, click buttons, verify result"
status: active
category: e2e
priority: P1
source_issue: null
created: 2026-03-27
last_run: 2026-04-04
last_result: fail
consecutive_passes: 0
notes: "2026-04-04 R104: FAIL — Calculator UWP not detectable by naturo (invisible to list apps and see). Cannot run flow. #785 blocks."

preconditions:
  - "naturo is installed and in PATH"
  - "Calculator is running"

steps:
  - description: "Discover calculator elements"
    command: "naturo see --app 计算器"
    expect: "Element tree shows number buttons, operators, and display"
  - description: "Click number 7"
    command: "naturo click <e_id_for_七>"
    expect: "Display shows 7"
  - description: "Screenshot verify number entry"
    command: "naturo capture --app 计算器 -o /tmp/tc-0004-step1.png"
    expect: "Screenshot shows 7 on calculator display"
  - description: "Fresh see, click +, click 3, click ="
    command: "naturo see --app 计算器 && naturo click <e_id_for_加> && naturo see --app 计算器 && naturo click <e_id_for_三> && naturo see --app 计算器 && naturo click <e_id_for_等于>"
    expect: "Display shows 10"
  - description: "Screenshot verify result"
    command: "naturo capture --app 计算器 -o /tmp/tc-0004-step2.png"
    expect: "Screenshot shows 7 + 3 = 10"

pass_criteria: "Calculator correctly computes 7+3=10 via naturo clicks, verified by screenshot"
fail_action: "File bug for calculator click failures"
