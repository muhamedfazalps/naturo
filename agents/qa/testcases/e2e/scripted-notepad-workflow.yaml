id: TC-0014
title: "Scripted workflow: launch → see JSON → parse element → click → type → verify → close"
status: active
category: e2e
priority: P1
source_issue: null
created: 2026-03-28
last_run: 2026-04-04
last_result: pass
consecutive_passes: 30
notes: "2026-04-04 R104: PASS — Notepad launch, type, capture, Ctrl+A, Delete, quit all worked. Chinese text typed correctly. JSON valid."

preconditions:
  - "naturo is installed and in PATH"
  - "Notepad is available"

steps:
  - description: "Launch Notepad"
    command: "naturo app launch notepad"
    expect: "Notepad opens successfully"
  - description: "Get element tree as JSON, parse to find Document element"
    command: "naturo see --app notepad -j | python -c \"import sys,json; ...\""
    expect: "JSON is valid and Document element is found with an eN ID"
  - description: "Click the editor element by ID"
    command: "naturo click --app notepad <eN>"
    expect: "Click succeeds, editor receives focus"
  - description: "Type test text"
    command: "naturo type --app notepad 'Script automation works!'"
    expect: "Text appears in Notepad editor"
  - description: "Screenshot verify"
    command: "naturo capture --app notepad -o /tmp/tc-0014.png"
    expect: "Screenshot shows typed text in editor"
  - description: "Close Notepad"
    command: "naturo app quit notepad"
    expect: "Notepad closes"

pass_criteria: "All 6 steps succeed sequentially. JSON is parseable. Text verified in screenshot."
fail_action: "File GitHub issue for broken scripting workflow"
