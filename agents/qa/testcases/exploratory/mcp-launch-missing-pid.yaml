id: TC-0023
title: "MCP launch_app returns success:true but omits PID in response"
status: active
category: exploratory
priority: P2
source_issue: 575
created: 2026-03-29
last_run: 2026-04-02
last_result: pass
consecutive_passes: 5
notes: "2026-04-02 R84: PASS — MCP launch_app returns PID 99852."

preconditions:
  - "naturo is installed and in PATH"
  - "No Notepad windows are open"

steps:
  - description: "Start MCP server and call launch_app"
    command: "printf '{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"initialize\",\"params\":{\"protocolVersion\":\"2024-11-05\",\"capabilities\":{},\"clientInfo\":{\"name\":\"test\",\"version\":\"1.0\"}}}\\n{\"jsonrpc\":\"2.0\",\"method\":\"notifications/initialized\"}\\n{\"jsonrpc\":\"2.0\",\"id\":2,\"method\":\"tools/call\",\"params\":{\"name\":\"launch_app\",\"arguments\":{\"name\":\"notepad\"}}}\\n' | timeout 15 naturo mcp start 2>&1"
    expect: "Response contains success:true AND a pid field with the launched process ID"
  - description: "Verify PID is in response"
    command: "Parse JSON response for id:2 and check for pid field"
    expect: "pid field present and is a positive integer"
  - description: "Cleanup"
    command: "naturo app quit notepad || true"
    expect: "Notepad closes"

pass_criteria: "MCP launch_app response includes PID so AI agents can target the launched window"
fail_action: "File enhancement issue: MCP launch_app should return PID in response"
