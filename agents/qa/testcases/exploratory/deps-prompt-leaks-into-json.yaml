id: TC-0057
title: "Optional-dep install prompt leaks into -j JSON output"
status: active
category: exploratory
priority: P2
source_issue: 869
created: 2026-05-28
last_run: 2026-05-28
last_result: fail
consecutive_passes: 0
notes: "2026-05-28 R122: FAIL — naturo desktop list -j emits 'Install it now? [Y/n]:' prompt before JSON envelope, breaking parsers. Root cause naturo/deps.py:_is_interactive ignores json_output flag."

preconditions:
  - "naturo is installed and in PATH"
  - "pyvda is NOT installed (so naturo desktop falls into ensure_package branch)"
  - "stdin is a TTY"

steps:
  - description: "Run desktop list with -j (JSON mode) and capture stdout"
    command: "naturo desktop list -j 2>&1"
    expect: "Single JSON document on stdout; no 'Install it now?' prose preceding it"
  - description: "Pipe the output through python -m json.tool"
    command: "naturo desktop list -j 2>&1 | python -m json.tool > /dev/null 2>&1; echo EXIT=$?"
    expect: "EXIT=0 (output is parseable JSON)"
  - description: "Confirm input() is not called in JSON mode"
    command: "echo '' | naturo desktop list -j; echo exit=$?"
    expect: "Same JSON envelope; exit=1; no hang waiting for input"

pass_criteria: "JSON mode never prints prose to stdout and never calls input(); the only stdout content is a single parseable JSON envelope."
fail_action: "Update #869. Apply the fix in naturo/deps.py:ensure_package to suppress the prompt and default auto_install=False when json_output=True."
