id: TC-0054
title: "Input commands (type/press/click) exit 2 with 'Usage:' banner on runtime errors instead of exit 1"
status: active
category: exploratory
priority: P2
source_issue: 866
created: 2026-05-27
last_run: 2026-05-28
last_result: fail
consecutive_passes: 0
notes: "R125: FAIL — type=2, press=2, click=2, see=1 (correct), type -j=1 (correct), Usage banner count=1 in stderr. #866 unchanged."

preconditions:
  - "naturo is installed and in PATH"
  - "Run in any session where naturo cannot bind to an interactive desktop (or temporarily induce a backend failure)"

steps:
  - description: "Probe input command exit code without -j (should be 1, not 2)"
    command: "naturo type 'x' > /dev/null 2>&1 ; echo $?"
    expect: "Exit code 1 (runtime error). Exit code 2 = FAIL (Click UsageError)"
  - description: "Probe press exit code without -j"
    command: "naturo press 'a' > /dev/null 2>&1 ; echo $?"
    expect: "Exit code 1. Exit code 2 = FAIL"
  - description: "Probe click exit code without -j"
    command: "naturo click e1 > /dev/null 2>&1 ; echo $?"
    expect: "Exit code 1. Exit code 2 = FAIL"
  - description: "Confirm read-only commands behave correctly"
    command: "naturo see > /dev/null 2>&1 ; echo $?"
    expect: "Exit code 1 (baseline — should already be correct)"
  - description: "Confirm -j flag returns correct exit code on input commands"
    command: "naturo type 'x' -j > /dev/null 2>&1 ; echo $?"
    expect: "Exit code 1 (already correct via sys.exit(1) branch)"
  - description: "Check stderr does NOT contain 'Usage:' banner"
    command: "naturo type 'x' 2>&1 | grep -c '^Usage:'"
    expect: "0 (no Usage banner — that prefix is reserved for actual argument errors)"

pass_criteria: "All input commands return exit 1 (not 2) on runtime errors AND no 'Usage:' banner is emitted for non-argument failures"
fail_action: "Update or reopen #866"