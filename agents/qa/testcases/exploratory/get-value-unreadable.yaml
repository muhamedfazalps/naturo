id: TC-0018
title: "get command returns 'no readable pattern' for Calculator display element"
status: active
category: exploratory
priority: P1
source_issue: null
created: 2026-03-28
last_run: 2026-03-31
last_result: pass
consecutive_passes: 9
notes: "2026-03-31 R70: PASS — get e15 returned '显示为 8' matching display."

preconditions:
  - "naturo is installed and in PATH"
  - "Calculator is open with a non-zero value displayed"

steps:
  - description: "See Calculator elements to find display"
    command: "naturo see --app-id a1"
    expect: "Element tree shows [Text] '显示为 NNN' with eN ref"
  - description: "Get value of display element"
    command: "naturo get e15 --aid a1"
    expect: "Returns the numeric value from the display (e.g. '579')"
  - description: "Screenshot verify display shows value"
    command: "naturo capture --app-id a1 -o /tmp/tc-0018.png"
    expect: "Screenshot shows calculator with visible number on display"

pass_criteria: "naturo get returns the readable value from Calculator display Text element"
fail_action: "File P1 issue: get command cannot read Calculator display value"
