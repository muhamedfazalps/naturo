id: TC-0084
title: "-h short flag not accepted as alias for --help (POSIX convention; emits 'No such option' exit 2)"
status: active
category: exploratory
priority: P2
source_issue: 899
created: 2026-05-29
last_run: 2026-05-29
last_result: fail
consecutive_passes: 0
notes: |
  R147: FAIL — re-confirmed on HEAD e2afdcb. `naturo -h` EXIT=2 with "Try 'naturo --help' for help."; `naturo see -h` EXIT=2 with same. Drift unchanged.
  R144 (First-time User): FAIL — `naturo -h` and every subcommand `naturo <cmd> -h` reject `-h` with 'Error: No such option: -h' exit 2. Click root group lacks `context_settings={'help_option_names': ['-h', '--help']}`. Trivial one-line fix at the root propagates to all subcommands. Discovered during First-time User simulation, hour-mod-8 = 0.

preconditions:
  - "naturo is installed and in PATH"

steps:
  - description: "Root group should accept -h as --help alias"
    command: "naturo -h > /dev/null 2>&1 ; echo $?"
    expect: "0 (treated as --help). Currently 2 with 'No such option: -h' (FAIL)."
  - description: "Subcommand should accept -h"
    command: "naturo see -h > /dev/null 2>&1 ; echo $?"
    expect: "0. Currently 2 (FAIL)."
  - description: "Subgroup should accept -h"
    command: "naturo app -h > /dev/null 2>&1 ; echo $?"
    expect: "0. Currently 2 (FAIL)."
  - description: "Subgroup leaf command should accept -h"
    command: "naturo app launch -h > /dev/null 2>&1 ; echo $?"
    expect: "0. Currently 2 (FAIL)."
  - description: "-h output should equal --help output"
    command: "diff <(naturo -h 2>&1) <(naturo --help 2>&1); echo $?"
    expect: "0 (identical). Currently differs (FAIL — -h prints 'No such option' instead of help)."

pass_criteria: "`naturo -h` and `naturo <any-cmd> -h` exit 0 and print the same content as the corresponding `--help` invocation."
fail_action: "Update or reopen #899"
