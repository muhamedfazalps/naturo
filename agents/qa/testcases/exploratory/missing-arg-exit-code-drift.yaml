id: TC-0083
title: "Missing-required-arg exit code drift: input/find/wait/get/set/app launch exit 1, Click-level errors exit 2"
status: active
category: exploratory
priority: P2
source_issue: 897
created: 2026-05-28
last_run: 2026-05-29
last_result: fail
consecutive_passes: 0
notes: |
  R147: FAIL — re-confirmed on HEAD e2afdcb. `naturo type` exit 1, `naturo press` exit 1, `naturo find` exit 1, `naturo get` exit 1, `naturo wait` exit 1, `naturo click` exit 2 (Click), `naturo see --thisisaTotallyfake` exit 2 (Click). Drift unchanged.
  R144: FAIL — re-confirmed on HEAD 893209e. `naturo type` → exit 1 with custom "Error: TEXT argument is required..."; `naturo press` → exit 1 "Missing argument 'KEY'"; `naturo find` → exit 1 "Missing argument 'QUERY'". Click-level errors still exit 2. Drift unchanged.

  R142 (Scripter persona): naturo's custom argument validation path returns exit 1 with INVALID_INPUT for missing required positionals on type/press/find/wait/get/set/app launch, while Click's own missing-flag-value / unknown-command / no-subcommand path returns exit 2.

  A Scripter using `case $? in 2) usage_error ;; 1) op_failed_retry ;; esac` misclassifies `naturo type` (missing TEXT) as a transient operation failure and may infinite-retry.

  Exit code matrix on HEAD `ca7a9bc`:
  | invocation                  | exit | path                         |
  |-----------------------------|------|------------------------------|
  | naturo nonexistentcmd       | 2    | Click default                |
  | naturo see --app            | 2    | Click missing flag value     |
  | naturo (no subcmd)          | 2    | Click group help             |
  | naturo app (no subcmd)      | 2    | Click group help             |
  | naturo type                 | 1    | INVALID_INPUT (naturo)       |
  | naturo press                | 1    | INVALID_INPUT (naturo)       |
  | naturo find                 | 1    | INVALID_INPUT (naturo)       |
  | naturo wait                 | 1    | INVALID_INPUT (naturo)       |
  | naturo get                  | 1    | INVALID_INPUT (naturo)       |
  | naturo set                  | 1    | INVALID_INPUT (naturo)       |
  | naturo app launch           | 1    | INVALID_INPUT (naturo)       |

preconditions:
  - "naturo is installed and in PATH"

steps:
  - description: "Click-level usage errors should be exit 2"
    command: "naturo nonexistentcmd > /dev/null 2>&1 ; echo $?"
    expect: "2"
  - description: "Missing flag value should be exit 2"
    command: "naturo see --app > /dev/null 2>&1 ; echo $?"
    expect: "2"
  - description: "Missing required positional for type should also be exit 2 (usage error)"
    command: "naturo type > /dev/null 2>&1 ; echo $?"
    expect: "2 (currently 1 — FAIL)"
  - description: "Missing required positional for press should be exit 2"
    command: "naturo press > /dev/null 2>&1 ; echo $?"
    expect: "2 (currently 1 — FAIL)"
  - description: "Missing required positional for find should be exit 2"
    command: "naturo find > /dev/null 2>&1 ; echo $?"
    expect: "2 (currently 1 — FAIL)"
  - description: "Missing required positional for wait should be exit 2"
    command: "naturo wait > /dev/null 2>&1 ; echo $?"
    expect: "2 (currently 1 — FAIL)"
  - description: "Missing required target for get should be exit 2"
    command: "naturo get > /dev/null 2>&1 ; echo $?"
    expect: "2 (currently 1 — FAIL)"
  - description: "Missing app name for app launch should be exit 2"
    command: "naturo app launch > /dev/null 2>&1 ; echo $?"
    expect: "2 (currently 1 — FAIL)"

pass_criteria: "All commands return exit 2 on missing-required-arg failures, matching Click's standard usage-error convention. Scripters can rely on a single exit-code contract for usage errors."
