id: TC-0055
title: "Hidden 'snapshot' command leaks into Click's 'Did you mean' suggestions"
status: active
category: exploratory
priority: P2
source_issue: 867
created: 2026-05-28
last_run: 2026-05-28
last_result: fail
consecutive_passes: 0
notes: "R125: FAIL — `naturo snapsho` → 'Did you mean snapshot?' still leaks. #867 unchanged."

preconditions:
  - "naturo is installed and in PATH"

steps:
  - description: "Confirm snapshot is HIDDEN from top-level --help"
    command: "naturo --help 2>&1 | grep -cE '^\\s+snapshot\\b'"
    expect: "0 (snapshot is hidden)"
  - description: "Confirm typo suggestion leaks the hidden command (screenshot)"
    command: "naturo screenshot 2>&1 | grep -c \"Did you mean 'snapshot'\""
    expect: "0 once fixed; currently 1 (FAIL)"
  - description: "Confirm second typo leaks too (snap)"
    command: "naturo snap 2>&1 | grep -c \"Did you mean 'snapshot'\""
    expect: "0 once fixed; currently 1 (FAIL)"
  - description: "Confirm third typo leaks too (snapshots plural)"
    command: "naturo snapshots 2>&1 | grep -c \"Did you mean 'snapshot'\""
    expect: "0 once fixed; currently 1 (FAIL)"

pass_criteria: "When snapshot is hidden from --help, it must also be hidden from typo suggestions — OR the command should be exposed in --help with a (debug) qualifier"
fail_action: "Update or reopen #867"