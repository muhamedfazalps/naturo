id: TC-0011
title: "--app filter matches wrong process when target app name appears in other window titles"
status: active
category: exploratory
priority: P2
source_issue: 789
created: 2026-03-28
last_run: 2026-04-02
last_result: fail
consecutive_passes: 0
notes: "2026-04-02 R95: FAIL — --app notepad matched Chrome window 'get help with notepad in windows' instead of reporting app not found. Confirms #789."

preconditions:
  - "naturo is installed and in PATH"
  - "Chrome is open with a tab containing 'notepad' in its title"
  - "Actual Notepad is NOT running"

steps:
  - description: "Ensure Notepad is closed"
    command: "naturo app quit notepad"
    expect: "No Notepad windows remain"
  - description: "Run see with --app notepad while Chrome has 'notepad' in title"
    command: "naturo see --app notepad"
    expect: "Should report 'App not found' or at minimum not return Chrome elements"
  - description: "Verify what was returned"
    command: "Check if returned elements belong to Chrome or Notepad"
    expect: "No cross-process contamination"

pass_criteria: "--app filter either reports app not found or warns about ambiguous match when only non-target processes contain the search term in title"
fail_action: "File GitHub issue for --app filter cross-process title matching"
