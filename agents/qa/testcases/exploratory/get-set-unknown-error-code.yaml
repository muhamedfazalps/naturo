id: TC-0064
title: "get/set -j error envelope uses UNKNOWN_ERROR code and omits suggested_action on stale snapshot ref"
status: active
category: exploratory
priority: P2
source_issue: 877
created: 2026-05-28
last_run: 2026-05-29
last_result: fail
consecutive_passes: 0
notes: |
  R147: FAIL — re-confirmed on HEAD e2afdcb. `naturo get e1 -j` and `naturo set e1 foo -j` both EXIT=1 with `{"success":false,"error":{"code":"UNKNOWN_ERROR","message":"Element ref 'e1' not found in snapshot cache. Run 'naturo see' first to capture elements."}}` — no `suggested_action`, generic code. #877 unchanged.
  R134: FAIL — get e1 -j and set e1 x -j both return {error:{code:UNKNOWN_ERROR, message:'Element ref e1 not found...'}} — no suggested_action, generic code. #877 unchanged on HEAD 1323777.

preconditions:
  - "naturo is installed and in PATH"
  - "No snapshot cache (no recent see) — guarantees stale-ref failure path"

steps:
  - description: "get eN with no snapshot uses a semantic error code (not UNKNOWN_ERROR)"
    command: "naturo -j get e1"
    expect: '.error.code is a specific code like STALE_SNAPSHOT_CACHE or ELEMENT_REF_NOT_FOUND, NOT "UNKNOWN_ERROR"'
  - description: "get eN error envelope includes suggested_action"
    command: "naturo -j get e1"
    expect: '.error.suggested_action is present and non-empty'
  - description: "set eN value with no snapshot also uses a semantic error code"
    command: "naturo -j set e1 abc"
    expect: '.error.code is a specific code; .error.suggested_action is present'

pass_criteria: "Both commands return semantic error codes (not UNKNOWN_ERROR) and include suggested_action"
fail_action: "Update or reopen #877"
