id: TC-0062
title: "dialog detect / taskbar list / tray list -j silently return success:true [] in NO_DESKTOP_SESSION"
status: active
category: exploratory
priority: P1
source_issue: 875
created: 2026-05-28
last_run: 2026-05-28
consecutive_passes: 0

preconditions:
  - "naturo is installed and in PATH"
  - "Session has no interactive desktop access (SSH / RDP-blocked / service session)"

steps:
  - description: "taskbar list returns NO_DESKTOP_SESSION error envelope in no-desktop session"
    command: "naturo -j taskbar list"
    expect: '{"success": false, "error": {"code": "NO_DESKTOP_SESSION", ...}} with exit 1 — NOT {"success": true, "items": [], "count": 0}'
  - description: "tray list returns NO_DESKTOP_SESSION error envelope in no-desktop session"
    command: "naturo -j tray list"
    expect: '{"success": false, "error": {"code": "NO_DESKTOP_SESSION", ...}} with exit 1 — NOT {"success": true, "icons": [], "count": 0}'
  - description: "dialog detect returns NO_DESKTOP_SESSION error envelope in no-desktop session"
    command: "naturo -j dialog detect"
    expect: '{"success": false, "error": {"code": "NO_DESKTOP_SESSION", ...}} with exit 1 — NOT {"success": true, "dialogs": [], "count": 0}'

pass_criteria: "All three commands return the NO_DESKTOP_SESSION envelope (matching list apps), and exit code is 1"
fail_action: "Update or reopen #875"
