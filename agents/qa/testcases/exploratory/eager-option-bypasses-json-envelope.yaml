id: TC-0061
title: "-j --version / -j --help / -j <unknown-cmd> bypass JSON envelope (#874)"
status: active
category: exploratory
priority: P2
source_issue: 874
created: 2026-05-28
last_run: 2026-05-28
last_result: fail
consecutive_passes: 0
notes: "R125: FAIL — naturo -j --version → 'naturo, version 0.3.1' (plain text, exit 0); naturo -j --help → plain Click help; naturo -j nonexistent-cmd → plain Click usage banner exit 2. Discovered during Accessibility User persona."

preconditions:
  - "naturo is installed and in PATH"

steps:
  - description: "-j --version should emit JSON envelope"
    command: "naturo -j --version 2>&1; echo EXIT=$?"
    expect: "{\"success\": true, \"version\": \"...\"} on stdout, EXIT=0. Currently: 'naturo, version 0.3.1' (plain text, FAIL)."
  - description: "JSON parseability check on -j --version"
    command: "naturo -j --version 2>&1 | python -m json.tool > /dev/null 2>&1; echo EXIT=$?"
    expect: "EXIT=0 (parseable). Currently EXIT=1 (FAIL)."
  - description: "-j --help should emit JSON envelope"
    command: "naturo -j --help 2>&1 | head -3"
    expect: "{\"success\": true, \"help\": {...}}. Currently: 'Usage: naturo [OPTIONS] COMMAND [ARGS]...' (FAIL)."
  - description: "-j on unknown command should emit JSON envelope, exit 1"
    command: "naturo -j nonexistent-cmd 2>&1; echo EXIT=$?"
    expect: "{\"success\": false, \"error\": {\"code\": \"UNKNOWN_COMMAND\", ...}}, EXIT=1. Currently: plain Click 'Usage:' + 'No such command', EXIT=2 (FAIL)."
  - description: "Position-independence: --version before -j"
    command: "naturo --version -j 2>&1"
    expect: "Same JSON envelope. Currently: plain text (FAIL)."

pass_criteria: "When -j/--json is present, every eager-option path (--version, --help) and the unknown-command path emit the standard JSON envelope on stdout"
fail_action: "Update or reopen #874. Hook Click's version/help/no-such-command handlers when ctx.params.get('json') is True."