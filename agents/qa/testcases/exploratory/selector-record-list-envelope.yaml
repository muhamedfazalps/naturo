preconditions:
  - "naturo is installed and in PATH"

steps:
  - description: "selector list -j must include top-level 'success' field"
    command: "naturo -j selector list"
    expect: 'Output is JSON object with top-level "success": true (currently outputs bare {})'
  - description: "record list -j must include top-level 'success' field"
    command: "naturo -j record list"
    expect: 'Output is JSON object with top-level "success": true and a "count" field (currently outputs bare {"recordings": [...]})'

pass_criteria: "Both outputs parse as JSON AND .success is true (or false on error). Matches envelope from list apps / clipboard get."
