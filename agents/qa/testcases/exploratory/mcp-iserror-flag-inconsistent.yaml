id: TC-0069
title: "MCP isError flag used inconsistently across tools"
status: active
category: exploratory
priority: P2
source_issue: 882
created: 2026-05-28
last_run: 2026-05-28
last_result: fail
consecutive_passes: 0
notes: "R129: discovered while exercising MCP tools. Some tool failures surface as MCP-level errors (`isError: true`, no payload, or stringified Pydantic error). Other failures bury the error in the JSON payload (`isError: false`, with `success: false` inside). AI agents must check BOTH fields, and the documented MCP contract uses `isError` as the primary failure discriminator."

preconditions:
  - "naturo is installed and in PATH"
  - "MCP server is reachable via stdio"

steps:
  - description: "Pydantic validation error (e.g. string for an int field)"
    command: "tools/call name=window_resize arguments={width:'not_a_number', height:100, title:'claude'}"
    expect: "isError=True, content is a stringified Pydantic error (also a separate bug — see #844)."
  - description: "press_key with unfocused key in NO_DESKTOP_SESSION"
    command: "tools/call name=press_key arguments={keys:'F1'}"
    expect: "isError=True, no payload."
  - description: "hotkey with no focus"
    command: "tools/call name=hotkey arguments={keys:'ctrl+c'}"
    expect: "isError=True, no payload."
  - description: "find_element with no matching selector"
    command: "tools/call name=find_element arguments={app:'claude', selector:\"Button[@name='NonExistentButton']\"}"
    expect: "isError=False, payload {success:false, error:{code: ELEMENT_NOT_FOUND}}."
  - description: "capture_window for nonexistent window"
    command: "tools/call name=capture_window arguments={window_title:'zzz_does_not_exist'}"
    expect: "isError=False, payload {success:false, error:{code: INTERNAL_ERROR}}."
  - description: "click without target args (validation-ish)"
    command: "tools/call name=click arguments={}"
    expect: "isError=False, payload {success:false, error:{code: INTERNAL_ERROR}}."

pass_criteria: "ALL tool failures use the same discriminator. Recommended: ALWAYS set isError:false at MCP level, ALWAYS embed `{success: false, error: {code, message}}` JSON in content. Reserve `isError:true` for unparseable MCP-protocol errors only. (Pydantic validation should be caught and mapped to a JSON payload too.)"
fail_action: "Update or file GitHub issue. Track until MCP error surface is unified."
