id: TC-0074
title: "naturo clipboard set has no --file/stdin input — asymmetric with `naturo type --file`, blocks >32KB or multi-line content"
status: active
category: exploratory
priority: P2
source_issue: null
created: 2026-05-28
last_run: 2026-05-29
last_result: fail
consecutive_passes: 0
notes: |
  R147: FAIL — re-confirmed on HEAD e2afdcb. `naturo clipboard set --help` shows only `Options: -j/--json, --help` and one positional TEXT — no `--file`, no stdin convention. #888 unchanged.
  R135 (Skeptical Evaluator persona): `naturo type --paste --file mytext.txt` works for typing file content, but `naturo clipboard set` accepts only a positional TEXT arg. No `--file`, no stdin `-` convention. Effects: (1) shell ARG_MAX caps text at ~32KB on MSYS/PowerShell; (2) multi-line content requires shell-specific escaping; (3) help example `\"line1\\nline2\"` stores literal backslash-n (length 12, not 11).

preconditions:
  - "naturo is installed and in PATH"
  - "Shell with ARG_MAX limit (any Windows shell)"

steps:
  - description: "clipboard set lacks --file flag"
    command: "naturo clipboard set --help 2>&1 | grep -- '--file'"
    expect: "Should show a --file PATH option mirroring `naturo type --file`. Currently: no match (FAIL)."
  - description: "stdin convention not honored — `-` stored as literal"
    command: "echo 'stdin content' | naturo clipboard set - -j"
    expect: "Either reads from stdin OR errors. Currently: stores literal '-' (length 1)."
  - description: "Backslash-n escape sequence handling — help example misleading"
    command: "naturo clipboard set 'line1\\nline2' -j && naturo clipboard get -j"
    expect: "Help text shows `naturo clipboard set \"line1\\nline2\"` as multi-line. Reality: stores literal backslash+n (length 12, not 11). FAIL on docs accuracy."
  - description: "Large payload via positional arg fails at shell layer (~32KB)"
    command: "naturo clipboard set \"$(python -c 'print(\"x\"*51200,end=\"\")')\" -j"
    expect: "Error: 'Argument list too long' at bash layer. naturo itself never executes. No workaround (no --file)."

pass_criteria: "naturo clipboard set supports --file PATH and/or stdin via `-`, AND help example accurately reflects newline handling"
fail_action: "File new issue: docs+ergonomics asymmetry with `naturo type --file`. P2."
