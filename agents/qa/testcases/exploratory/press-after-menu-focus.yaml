id: TC-0006
title: "press key fails silently after opening and closing a menu"
status: active
category: exploratory
priority: P1
source_issue: null
created: 2026-03-27
last_run: 2026-04-04
last_result: fail
consecutive_passes: 0
notes: "2026-04-04 R109: FAIL — related scenario confirmed: click 文件 menu → type reports success but text not typed (Chinese User simulation). Menu focus steals keystrokes, naturo reports silent success. Variant of same focus management bug."

preconditions:
  - "naturo is installed and in PATH"
  - "Notepad is available"

steps:
  - description: "Launch Notepad"
    command: "naturo app launch notepad"
    expect: "Notepad opens successfully"
  - description: "Verify press works on fresh launch"
    command: "naturo press 'A' --app notepad"
    expect: "Character A appears in editor"
  - description: "Screenshot confirm baseline"
    command: "naturo capture --app notepad -o /tmp/tc-0006-before.png"
    expect: "Screenshot shows 'A' in editor"
  - description: "Open and close menu"
    command: "naturo press 'alt+f' --app notepad && sleep 1 && naturo press 'escape' --app notepad"
    expect: "Menu opens then closes"
  - description: "Try pressing another key after menu close"
    command: "naturo press 'B' --app notepad"
    expect: "Character B appears after A in editor (total 2 chars)"
  - description: "Screenshot verify"
    command: "naturo capture --app notepad -o /tmp/tc-0006-after.png"
    expect: "Screenshot shows 'AB' in editor with 2 characters count"
  - description: "Clean up"
    command: "naturo app quit notepad"
    expect: "Notepad closes"

pass_criteria: "press delivers keystrokes to text editor even after menu open/close cycle"
fail_action: "File GitHub issue for focus management after menu interaction"
