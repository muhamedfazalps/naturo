id: TC-0008
title: "--app notepad targets different windows for type vs capture when multiple windows exist"
status: active
category: exploratory
priority: P1
source_issue: null
created: 2026-03-27
last_run: 2026-04-05
last_result: pass
consecutive_passes: 27
notes: "2026-04-05 R114: PASS — see --app notepad -j returns valid JSON with correct structure."

preconditions:
  - "naturo is installed and in PATH"
  - "Multiple Notepad windows/tabs are open"

steps:
  - description: "Launch Notepad (or ensure multiple tabs open)"
    command: "naturo app launch notepad"
    expect: "Notepad opens"
  - description: "Type unique text"
    command: "naturo type --app notepad 'TARGETING_TEST_XYZ'"
    expect: "Text appears in a Notepad window"
  - description: "Capture immediately after"
    command: "naturo capture --app notepad -o /tmp/tc-0008.png"
    expect: "Screenshot shows the SAME window that received the typed text"
  - description: "Verify consistency"
    command: "Compare routing PIDs/HWNDs from type vs capture"
    expect: "Both commands target the same HWND"

pass_criteria: "type and capture with same --app flag target the same window"
fail_action: "File GitHub issue for non-deterministic window selection"
