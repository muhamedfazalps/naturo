id: TC-0025
title: "Element coordinates wrong on high-DPI display (4K + 150% scaling)"
status: retired
category: exploratory
priority: P0
source_issue: 613
created: 2026-03-29
last_run: 2026-04-02
last_result: pass
consecutive_passes: 6
notes: "2026-04-02 R102: PASS — 1920x1080 @ 100% DPI (scale 1.0x, 96 DPI). All element coordinates positive and within screen bounds. Cannot test 150% DPI on this machine."

preconditions:
  - "naturo is installed and in PATH"
  - "Display scaling set to 150% (Settings → Display → Scale)"
  - "Notepad is open and visible on screen"

steps:
  - description: "Check current display config"
    command: "naturo list screens -j"
    expect: "scale_factor matches Windows setting, resolution matches physical display"
  - description: "Get Notepad element tree"
    command: "naturo see --app notepad"
    expect: "ALL coordinates are positive and within screen bounds (0 to screen_width/height). No negative values like -31991."
  - description: "Verify highlight alignment"
    command: "naturo highlight --app notepad"
    expect: "Bounding boxes visually align with actual Notepad UI elements. Boxes are NOT outside the window or on other apps."
  - description: "Test click accuracy"
    command: "naturo click e3 --app notepad"
    expect: "Click hits the correct element inside Notepad, not offset to a random screen position"
  - description: "Restore DPI to original setting"
    command: "echo 'Manually restore DPI via Settings → Display → Scale'"
    expect: "DPI restored to original value"

pass_criteria: "All coordinates positive, within screen bounds, highlight boxes align, click hits correct target at 150% DPI"
fail_action: "File P0 bug — DPI coordinate mismatch makes all operations unusable on high-DPI displays"
