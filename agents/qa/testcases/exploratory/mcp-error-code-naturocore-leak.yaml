id: TC-0068
title: "MCP tool errors leak NaturoCoreError C++ exception names instead of typed codes"
status: active
category: exploratory
priority: P1
source_issue: 881
created: 2026-05-28
last_run: 2026-05-28
last_result: fail
consecutive_passes: 0
notes: "R129: discovered while exercising MCP tools as the AI Agent Builder persona. Multiple tools return `INTERNAL_ERROR` + a leaked C++ exception name (e.g. `NaturoCoreError: capture_window: System/COM error`, `NaturoCoreError: key_type: System/COM error`, `NaturoCoreError: mouse_move: System/COM error`) instead of mapping the failure to a typed code such as `NO_DESKTOP_SESSION`, `WINDOW_NOT_FOUND`, or `INVALID_INPUT` that CLI counterparts use. Agents cannot programmatically discriminate the error class."

preconditions:
  - "naturo is installed and in PATH"
  - "MCP server is reachable via stdio"

steps:
  - description: "Initialize MCP server, then call capture_window with a nonexistent window title"
    command: "send JSON-RPC tools/call name=capture_window arguments={window_title: 'zzz_does_not_exist_xyz'}"
    expect: "Expected: success:false, code WINDOW_NOT_FOUND (or NO_DESKTOP_SESSION when applicable). Actual: success:false, code INTERNAL_ERROR, message 'NaturoCoreError: capture_window: System/COM error'."
  - description: "Call type_text with no focused target in a non-interactive session"
    command: "send JSON-RPC tools/call name=type_text arguments={text: 'qa-mcp-test'}"
    expect: "Expected: typed error NO_DESKTOP_SESSION. Actual: INTERNAL_ERROR / 'NaturoCoreError: key_type: System/COM error'."
  - description: "Call click at coordinates with no desktop"
    command: "send JSON-RPC tools/call name=click arguments={x:100, y:100}"
    expect: "Expected: typed error NO_DESKTOP_SESSION. Actual: INTERNAL_ERROR / 'NaturoCoreError: mouse_move: System/COM error'."

pass_criteria: "Every MCP tool failure maps to one of the documented typed error codes (NO_DESKTOP_SESSION, WINDOW_NOT_FOUND, ELEMENT_NOT_FOUND, INVALID_INPUT, ...). The string 'NaturoCoreError' MUST NOT appear in any payload. INTERNAL_ERROR should only appear for genuinely unmapped/unexpected failures and should still hide the C++ class name."
fail_action: "Update or file the corresponding GitHub issue. Track until error mapping layer is added between core C++ DLL and MCP layer."
