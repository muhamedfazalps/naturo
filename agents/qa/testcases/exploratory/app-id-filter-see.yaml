id: TC-0039
title: "--app aN (app ID from list apps) fails for see/click/type but --app-id aN works"
status: retired
category: exploratory
priority: P1
source_issue: 752
created: 2026-04-01
last_run: 2026-04-02
last_result: pass
consecutive_passes: 7
notes: "2026-04-02 R87: PASS — see --app a1 returns element tree for first app."

preconditions:
  - "naturo is installed and in PATH"
  - "At least one app is visible (e.g. Calculator or Notepad)"

steps:
  - description: "List apps to get app IDs"
    command: "naturo list apps"
    expect: "Shows apps with IDs like a1, a2, etc."
  - description: "Try see with --app using the app ID"
    command: "naturo see --app a1"
    expect: "Should return element tree for app a1, but currently returns 'No window found'"
  - description: "Try see with --app-id using the same ID"
    command: "naturo see --app-id a1"
    expect: "Returns element tree correctly"
  - description: "Screenshot verification"
    command: "naturo capture -o /tmp/tc-0039.png"
    expect: "Screenshot shows the app is open and visible"

pass_criteria: "Both --app aN and --app-id aN return the same element tree for the same app"
fail_action: "File GitHub issue: --app should accept app IDs from list apps output, or list apps should clearly indicate to use --app-id"
