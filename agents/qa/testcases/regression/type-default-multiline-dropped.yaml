id: TC-0050
title: "naturo type in default mode drops literal newlines from multi-line text"
status: active
category: regression
priority: P1
source_issue: null
created: 2026-04-04
last_run: 2026-04-05
last_result: fail
consecutive_passes: 0
notes: "2026-04-05 R114: FAIL — naturo type with \\n produces literal text not newlines. #840 open."

preconditions:
  - "naturo is installed and in PATH"
  - "Notepad is running with empty editor"

steps:
  - description: "Launch Notepad and clear editor"
    command: "naturo app launch notepad && sleep 2 && naturo press 'ctrl+a' --app notepad && naturo press 'delete' --app notepad"
    expect: "Empty Notepad editor"
  - description: "Type multi-line text using default mode (no -E flag)"
    command: |
      naturo type "Line 1
      Line 2
      Line 3" --app notepad
    expect: "Text should appear on 3 separate lines in the editor"
  - description: "Screenshot verify"
    command: "naturo capture --app notepad -o /tmp/tc-0050.png"
    expect: "Screenshot shows 3 lines: Line 1, Line 2, Line 3. Status bar shows line 3."
  - description: "Cleanup"
    command: "naturo app quit notepad"
    expect: "Notepad closed"

pass_criteria: "naturo type in default mode correctly produces multi-line text when input contains literal newlines"
fail_action: "File P1 bug: default type mode drops newlines from multi-line text input"
