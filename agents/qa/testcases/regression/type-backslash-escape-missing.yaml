id: TC-0030
title: "naturo type has no way to produce literal backslash before r/n/t — breaks Windows file paths"
status: retired
category: regression
priority: P1
source_issue: 619
created: 2026-03-29
last_run: 2026-03-31
last_result: pass
consecutive_passes: 6
notes: "2026-03-31 R72: PASS — type 'C:\\Users\\test\\path' correctly produces literal backslashes. Screenshot verified."

preconditions:
  - "naturo is installed and in PATH"
  - "Notepad is available"

steps:
  - description: "Launch Notepad"
    command: "naturo app launch notepad"
    expect: "Notepad opens"
  - description: "Type a Windows file path containing \\r and \\t"
    command: "naturo type 'C:\\Users\\test\\report.txt' --app notepad"
    expect: "Literal text 'C:\\Users\\test\\report.txt' appears in editor"
  - description: "Screenshot verify"
    command: "naturo capture --app notepad -o /tmp/tc-0030.png"
    expect: "Screenshot shows the exact path with backslashes, no tab or carriage return interpretation"
  - description: "Cleanup"
    command: "naturo app quit notepad"
    expect: "Notepad closes"

pass_criteria: "naturo type supports \\\\ to produce literal backslash, so Windows paths can be typed correctly"
fail_action: "File P1 issue: type command needs \\\\ escape for literal backslash to support Windows file paths"
