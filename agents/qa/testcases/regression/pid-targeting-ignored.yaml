id: TC-0012
title: "--pid flag ignored: see/click always returns foreground window instead of specified PID"
status: active
category: regression
priority: P0
source_issue: 471
created: 2026-03-28
last_run: 2026-03-31
last_result: pass
consecutive_passes: 3
notes: "2026-03-31 R70: PASS — see --pid 82668 correctly returned Calculator tree."

preconditions:
  - "naturo is installed and in PATH"
  - "At least 2 different apps are running (e.g. Notepad and Calculator)"

steps:
  - description: "Launch Notepad and Calculator"
    command: "naturo app launch notepad && naturo app launch calculator"
    expect: "Both apps launch successfully"
  - description: "Get Calculator PID"
    command: "naturo list apps -j | python -c \"import json,sys; d=json.load(sys.stdin); [print(a['pid']) for a in d.get('windows',d) if 'Calculator' in a.get('process_name','')]\""
    expect: "Outputs Calculator PID"
  - description: "Use --pid to target Calculator"
    command: "naturo see --pid <CALCULATOR_PID>"
    expect: "Element tree shows Calculator UI (buttons 0-9, operators, display)"
  - description: "Screenshot verify"
    command: "naturo capture --pid <CALCULATOR_PID> -o /tmp/tc-0012.png"
    expect: "Screenshot shows Calculator window, NOT the foreground window"

pass_criteria: "--pid flag correctly targets the specified process, not the foreground window"
fail_action: "File GitHub issue for --pid targeting being ignored"
