id: TC-0034
title: "naturo capture fails with 'File I/O error' when output path contains Chinese characters"
status: active
category: regression
priority: P1
source_issue: 693
created: 2026-03-31
last_run: 2026-04-01
last_result: pass
consecutive_passes: 2
notes: "2026-04-01 R75: PASS — naturo capture -o /tmp/中文路径/测试截图.png saves 1920x1080. Chinese filepath works."

preconditions:
  - "naturo is installed and in PATH"
  - "Any visible window is available for capture"

steps:
  - description: "Create a directory with Chinese characters"
    command: "mkdir -p /tmp/中文路径"
    expect: "Directory created successfully"
  - description: "Capture to a file path with Chinese characters"
    command: "naturo capture -o /tmp/中文路径/测试截图.png"
    expect: "Screenshot saved successfully"
  - description: "Control test: capture to English path"
    command: "naturo capture -o /tmp/test-english.png"
    expect: "Screenshot saved successfully (proving capture works)"

pass_criteria: "naturo capture succeeds with Chinese file paths, not just English paths"
fail_action: "File P1 bug: capture command fails with Chinese/Unicode file paths"
