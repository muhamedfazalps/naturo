id: TC-0043
title: "app launch calculator reports success but Calculator invisible to list apps and see"
status: active
category: regression
priority: P0
source_issue: 785
created: 2026-04-02
last_run: 2026-04-02
last_result: pass
consecutive_passes: 3
notes: "2026-04-02 R99: PASS — Calculator visible in list apps and see after launch. Consecutive 3."

preconditions:
  - "naturo is installed and in PATH"
  - "Calculator is NOT running"

steps:
  - description: "Launch Calculator"
    command: "naturo app launch calculator"
    expect: "Calculator opens successfully, PID reported"
  - description: "Check Calculator appears in list apps"
    command: "naturo list apps"
    expect: "Calculator window appears in the app list"
  - description: "Inspect Calculator element tree"
    command: "naturo see --app calculator"
    expect: "Element tree with Calculator UI elements (buttons, display)"
  - description: "Verify Calculator is actually running"
    command: "tasklist //FI \"IMAGENAME eq CalculatorApp.exe\""
    expect: "CalculatorApp.exe process exists"
  - description: "Cleanup"
    command: "naturo app quit calculator || taskkill //IM CalculatorApp.exe //F"
    expect: "Calculator process terminated"

pass_criteria: "Calculator appears in list apps AND see returns element tree after app launch"
fail_action: "File/update GitHub issue #785 — UWP Calculator PID mismatch causes complete invisibility"
