name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  build-dll:
    name: Build DLL
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Configure CMake
        run: cmake -B build -S core -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Upload DLL
        uses: actions/upload-artifact@v7
        with:
          name: naturo-core-dll
          path: build/bin/Release/naturo_core.dll
          if-no-files-found: error

  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    needs: build-dll
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Download DLL
        uses: actions/download-artifact@v8
        with:
          name: naturo-core-dll
          path: naturo/bin/

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
