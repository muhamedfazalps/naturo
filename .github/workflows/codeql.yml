name: CodeQL

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 6 * * 1"  # Weekly Monday 06:00 UTC

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ matrix.language == 'c-cpp' && 'windows-latest' || 'ubuntu-latest' }}
    permissions:
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [python, c-cpp]
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Build C++ (Windows)
        if: matrix.language == 'c-cpp'
        run: |
          cmake -B build -S core -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

  # Gate job whose name matches the branch-protection required check "CodeQL".
  # Without this, the matrix jobs report as "Analyze (python)" / "Analyze (c-cpp)"
  # which don't satisfy the required status check.
  codeql-gate:
    name: CodeQL
    runs-on: ubuntu-latest
    needs: [analyze]
    if: ${{ always() }}
    steps:
      - name: Check analysis results
        run: |
          if [[ "${{ needs.analyze.result }}" != "success" ]]; then
            echo "::error::CodeQL analysis did not succeed (${{ needs.analyze.result }})"
            exit 1
          fi
          echo "✅ CodeQL analysis passed"
