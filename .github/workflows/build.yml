name: Build & Test

on:
  push:
    branches: ["*"]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install linting tools
        run: pip install ruff mypy

      - name: Ruff lint
        run: ruff check naturo/

      - name: Mypy type check
        run: mypy naturo/

  version-check:
    name: Version Consistency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check all version strings match
        shell: bash
        run: |
          PY_VER=$(grep -oP '__version__\s*=\s*"\K[^"]+' naturo/version.py)
          CMAKE_VER=$(grep -oP 'project\(naturo_core\s+VERSION\s+\K\S+' core/CMakeLists.txt)
          CPP_VER=$(grep -oP 'NATURO_VERSION\s*=\s*"\K[^"]+' core/src/version.cpp)
          PYPROJECT_VER=$(grep -oP '^version\s*=\s*"\K[^"]+' pyproject.toml)

          echo "Python:      $PY_VER"
          echo "CMakeLists:  $CMAKE_VER"
          echo "version.cpp: $CPP_VER"
          echo "pyproject:   $PYPROJECT_VER"

          FAIL=0
          if [ "$PY_VER" != "$CMAKE_VER" ]; then
            echo "❌ Python ($PY_VER) != CMakeLists ($CMAKE_VER)"
            FAIL=1
          fi
          if [ "$PY_VER" != "$CPP_VER" ]; then
            echo "❌ Python ($PY_VER) != version.cpp ($CPP_VER)"
            FAIL=1
          fi
          if [ "$PY_VER" != "$PYPROJECT_VER" ]; then
            echo "❌ Python ($PY_VER) != pyproject.toml ($PYPROJECT_VER)"
            FAIL=1
          fi
          if [ "$FAIL" -eq 1 ]; then
            echo "::error::Version mismatch detected! All version strings must match."
            exit 1
          fi
          echo "✅ All versions match: $PY_VER"

  build-dll:
    name: Build C++ Core (Windows)
    needs: version-check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Configure CMake
        run: cmake -B build -S core -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Run C++ tests
        run: ctest --test-dir build --build-config Release --output-on-failure

      - name: Upload DLL artifact
        uses: actions/upload-artifact@v5
        with:
          name: naturo-core-dll
          path: |
            build/bin/Release/naturo_core.dll
            build/lib/Release/naturo_core.lib
          if-no-files-found: error

  build-python:
    name: Python Tests with DLL (Windows)
    runs-on: windows-latest
    needs: build-dll
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Download DLL
        uses: actions/download-artifact@v5
        with:
          name: naturo-core-dll
          path: naturo/bin/

      - name: Flatten DLL into naturo/bin
        shell: bash
        run: |
          # download-artifact preserves the directory structure
          if [ -d "naturo/bin/bin/Release" ]; then
            cp naturo/bin/bin/Release/*.dll naturo/bin/ 2>/dev/null || true
          fi
          if [ -d "naturo/bin/lib/Release" ]; then
            cp naturo/bin/lib/Release/*.lib naturo/bin/ 2>/dev/null || true
          fi
          ls -la naturo/bin/

      - name: Install package
        shell: bash
        timeout-minutes: 5
        run: |
          echo "::group::pip install"
          pip install -e ".[dev,mcp,annotate,windows]" 2>&1
          echo "::endgroup::"
          echo "::group::pywin32 postinstall"
          # pywin32 postinstall registers COM DLLs.  The module may live
          # under Scripts/ on some runner images.  Try multiple locations.
          python -c "
          import importlib, inspect, sys, os, glob

          def run_install(mod):
              '''Call install() with or without lib_dir depending on signature.'''
              sig = inspect.signature(mod.install)
              if 'lib_dir' in sig.parameters:
                  lib_dir = os.path.join(sys.prefix, 'Lib', 'site-packages')
                  mod.install(lib_dir)
              else:
                  mod.install()

          # Attempt direct import first
          try:
              import pywin32_postinstall
              run_install(pywin32_postinstall)
              print('pywin32 postinstall OK (direct import)')
              sys.exit(0)
          except ImportError:
              pass
          # Fallback: find the script in site-packages/pywin32_system32 or Scripts
          for pattern in [
              os.path.join(sys.prefix, 'Scripts', 'pywin32_postinstall.py'),
              os.path.join(sys.prefix, 'Lib', 'site-packages', 'pywin32_system32', '..', 'pywin32_postinstall.py'),
          ]:
              matches = glob.glob(pattern)
              if matches:
                  spec = importlib.util.spec_from_file_location('pywin32_postinstall', matches[0])
                  mod = importlib.util.module_from_spec(spec)
                  spec.loader.exec_module(mod)
                  run_install(mod)
                  print(f'pywin32 postinstall OK (from {matches[0]})')
                  sys.exit(0)
          print('WARNING: pywin32_postinstall not found, skipping')
          " 2>&1 || true
          echo "::endgroup::"

      - name: Verify environment
        shell: bash
        timeout-minutes: 2
        run: |
          python -c "
          import sys, time
          failed = []
          modules = ['naturo', 'pytest', 'win32api', 'win32con', 'comtypes', 'ctypes']
          for mod in modules:
              t0 = time.time()
              try:
                  __import__(mod)
                  dt = time.time() - t0
                  print(f'  OK {mod} ({dt:.2f}s)')
              except ImportError as e:
                  dt = time.time() - t0
                  print(f'  FAIL {mod} ({dt:.2f}s): {e}')
                  failed.append(mod)
          if failed:
              print(f'::error::Critical modules failed to import: {failed}')
              sys.exit(1)
          "
          python -c "
          from naturo.bridge import NaturoCore
          try:
              core = NaturoCore()
              print(f'DLL loaded, version: {core.version()}')
          except Exception as e:
              print(f'WARNING: DLL not loaded ({e}) — tests requiring DLL will be skipped')
          "

      - name: Collect tests (dry run)
        shell: bash
        timeout-minutes: 3
        run: |
          echo "Collecting tests to detect import-phase hangs..."
          pytest --collect-only -q -m "not ui and not integration" 2>&1 | tail -5

      - name: Run all tests
        shell: bash
        timeout-minutes: 5
        run: |
          # Always skip desktop/UI tests on CI — GitHub Actions Windows runners
          # have unreliable desktop sessions (explorer.exe may run but UIA segfaults).
          # Desktop tests are covered by QA on robot-compile (real desktop).
          # See docs/DECISIONS.md "GitHub Actions Windows Runner"
          MARKERS="not ui and not integration and not desktop"
          echo "⚠️ Skipping desktop-dependent tests on CI (covered by QA on robot-compile)"
          pytest -v -m "$MARKERS" \
            --timeout=30 --timeout-method=thread \
            -x --tb=short \
            --junit-xml=pytest-results.xml \
            -p no:cacheprovider \
            2>&1 | tee pytest-output.txt
          echo "EXIT_CODE=$?" >> pytest-output.txt
        env:
          PYTEST_TIMEOUT: "30"

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: pytest-logs
          path: |
            pytest-output.txt
            pytest-results.xml
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v5
        with:
          name: naturo-python-tested
          path: naturo/bin/naturo_core.dll
          if-no-files-found: warn

  lint-and-test-python:
    name: Python Tests (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run tests (skip Windows/desktop tests)
        run: pytest -v -m "not ui and not integration and not desktop and not windows"

  test-python-macos:
    name: Python Tests (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run tests (skip Windows/desktop tests)
        run: pytest -v -m "not ui and not integration and not desktop and not windows"

  notify:
    name: Feishu Notification
    runs-on: ubuntu-latest
    needs: [lint, build-dll, build-python, lint-and-test-python, test-python-macos]
    if: ${{ always() && !cancelled() }}
    steps:
      - name: Determine overall status
        id: status
        run: |
          # Check each job result - skip notification if any job is still pending
          LINT_CHECK="${{ needs.lint.result }}"
          BUILD_DLL="${{ needs.build-dll.result }}"
          BUILD_PY="${{ needs.build-python.result }}"
          LINT="${{ needs.lint-and-test-python.result }}"
          MACOS="${{ needs.test-python-macos.result }}"

          echo "lint: $LINT_CHECK"
          echo "build-dll: $BUILD_DLL"
          echo "build-python: $BUILD_PY"
          echo "lint-and-test-python: $LINT"
          echo "test-python-macos: $MACOS"

          # If any result is empty or "pending", something went wrong - skip notification
          if [[ -z "$LINT_CHECK" || -z "$BUILD_DLL" || -z "$BUILD_PY" || -z "$LINT" || -z "$MACOS" ]]; then
            echo "::warning::Some jobs have not completed yet, skipping notification"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [[ "$LINT_CHECK" == "success" && \
                "$BUILD_DLL" == "success" && \
                "$BUILD_PY" == "success" && \
                "$LINT" == "success" && \
                "$MACOS" == "success" ]]; then
            echo "result=success" >> $GITHUB_OUTPUT
            echo "emoji=✅" >> $GITHUB_OUTPUT
          elif [[ "$LINT_CHECK" == "cancelled" || "$BUILD_DLL" == "cancelled" || "$BUILD_PY" == "cancelled" || \
                  "$LINT" == "cancelled" || "$MACOS" == "cancelled" ]]; then
            echo "result=cancelled" >> $GITHUB_OUTPUT
            echo "emoji=⏹️" >> $GITHUB_OUTPUT
          else
            echo "result=failure" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
          fi
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Send Feishu notification
        if: ${{ steps.status.outputs.skip != 'true' }}
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          CI_STATUS: ${{ steps.status.outputs.result }}
          CI_EMOJI: ${{ steps.status.outputs.emoji }}
          CI_COMMIT: ${{ github.sha }}
          CI_BRANCH: ${{ github.ref_name }}
          CI_ACTOR: ${{ github.actor }}
          CI_REPO: ${{ github.repository }}
          CI_RUN_ID: ${{ github.run_id }}
          CI_COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          SHORT_COMMIT="${CI_COMMIT:0:7}"
          RUN_URL="https://github.com/${CI_REPO}/actions/runs/${CI_RUN_ID}"
          # Use first line of commit message only
          FIRST_LINE=$(printf '%s' "$CI_COMMIT_MSG" | head -1)

          # Build JSON safely with jq to handle any special characters in commit message
          PAYLOAD=$(jq -n \
            --arg emoji "$CI_EMOJI" \
            --arg status "$CI_STATUS" \
            --arg repo "$CI_REPO" \
            --arg branch "$CI_BRANCH" \
            --arg commit "$SHORT_COMMIT" \
            --arg msg "$FIRST_LINE" \
            --arg actor "$CI_ACTOR" \
            --arg url "$RUN_URL" \
            '{
              msg_type: "text",
              content: {
                text: ("🚀 Naturo CI Notification\n" + $emoji + " Status: " + $status + "\n📦 Repo: " + $repo + "\n🌿 Branch: " + $branch + "\n📝 Commit: " + $commit + " — " + $msg + "\n👤 Triggered by: " + $actor + "\n🔗 Details: " + $url)
              }
            }')

          curl -s -X POST "$FEISHU_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

  release:
    name: Release & Publish
    runs-on: windows-latest
    needs: [lint, build-dll, build-python, lint-and-test-python, test-python-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Download DLL
        uses: actions/download-artifact@v5
        with:
          name: naturo-core-dll
          path: release-artifacts/

      - name: Copy DLL into package
        shell: bash
        run: |
          mkdir -p naturo/bin
          if [ -d "release-artifacts/bin/Release" ]; then
            cp release-artifacts/bin/Release/*.dll naturo/bin/ 2>/dev/null || true
          fi
          ls -la naturo/bin/

      - name: Build wheel and sdist
        run: |
          pip install build
          python -m build

      # (#408) PyPI publishing removed — handled by publish.yml
      # (triggered by the release: published event below).
      # This avoids duplicate publishes and HTTP 409 conflicts.

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/**/*
            dist/*.whl
            dist/*.tar.gz
          generate_release_notes: true
